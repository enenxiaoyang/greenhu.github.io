<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>职位申请 | GreenHub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/id/1068/1920/1080');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
      color: white;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .header p {
      opacity: 0.9;
    }
    .application-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .job-info {
      background: #f0f9f9;
      border-left: 4px solid #2c7a7b;
      padding: 1rem;
      margin-bottom: 2rem;
      border-radius: 0 8px 8px 0;
    }
    .job-info h2 {
      color: #2c7a7b;
      margin-bottom: 0.5rem;
    }
    .job-info p {
      color: #666;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #333;
    }
    label .required {
      color: #e53e3e;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2c7a7b;
      box-shadow: 0 0 0 3px rgba(44, 122, 123, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    .file-upload {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .file-upload:hover {
      border-color: #2c7a7b;
      background: #f0f9f9;
    }
    .file-upload input[type="file"] {
      display: none;
    }
    .file-upload-label {
      color: #666;
      cursor: pointer;
    }
    .btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: #2c7a7b;
      color: white;
    }
    .btn-primary:hover {
      background: #246a6b;
    }
    .btn-secondary {
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
      margin-right: 1rem;
    }
    .btn-secondary:hover {
      background: #f5f5f5;
    }
    .btn-group {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
    }
    .hint {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .user-info {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .user-info p {
      margin: 0.25rem 0;
      color: #666;
    }
    .user-info strong {
      color: #333;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>职位申请</h1>
    <p>填写以下信息申请您感兴趣的职位</p>
  </div>

  <div class="application-card">
    <!-- 职位信息 -->
    <div class="job-info">
      <h2 id="jobTitle">加载中...</h2>
      <p id="jobDetails">请填写下方表单完成申请</p>
    </div>

    <!-- 用户信息 -->
    <div class="user-info" id="userInfo">
      <p><strong>申请人：</strong><span id="userName">-</span></p>
      <p><strong>邮箱：</strong><span id="userEmail">-</span></p>
    </div>

    <form id="applicationForm">
      <div class="form-row">
        <div class="form-group">
          <label>手机号码 <span class="required">*</span></label>
          <input type="tel" name="phone" placeholder="请输入手机号码" required />
        </div>
        <div class="form-group">
          <label>期望薪资</label>
          <select name="salary">
            <option value="">请选择</option>
            <option value="面议">面议</option>
            <option value="5k-8k">5k - 8k</option>
            <option value="8k-12k">8k - 12k</option>
            <option value="12k-18k">12k - 18k</option>
            <option value="18k-25k">18k - 25k</option>
            <option value="25k+">25k 以上</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>工作年限</label>
          <select name="experience">
            <option value="">请选择</option>
            <option value="应届生">应届生</option>
            <option value="1-3年">1-3年</option>
            <option value="3-5年">3-5年</option>
            <option value="5-10年">5-10年</option>
            <option value="10年以上">10年以上</option>
          </select>
        </div>
        <div class="form-group">
          <label>最高学历</label>
          <select name="education">
            <option value="">请选择</option>
            <option value="高中/中专">高中/中专</option>
            <option value="大专">大专</option>
            <option value="本科">本科</option>
            <option value="硕士">硕士</option>
            <option value="博士">博士</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>个人简介 <span class="required">*</span></label>
        <textarea name="introduction" placeholder="请简要介绍您的工作经历、专业技能以及为什么想加入 GreenHub..." required></textarea>
      </div>

      <div class="form-group">
        <label>相关经历</label>
        <textarea name="experience_detail" placeholder="请描述您的环保相关经历、志愿者活动或其他相关经验（选填）"></textarea>
      </div>

      <div class="form-group">
        <label>上传简历</label>
        <div class="file-upload">
          <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" />
          <label for="resume" class="file-upload-label">
            📎 点击上传简历（PDF、Word 格式）
            <br>
            <small style="color: #999;">支持 .pdf, .doc, .docx 文件</small>
          </label>
        </div>
        <p id="fileName" style="margin-top: 0.5rem; color: #2c7a7b; font-size: 0.9rem;"></p>
      </div>

      <div class="btn-group">
        <a href="index.html" class="btn btn-secondary">返回首页</a>
        <button type="submit" class="btn btn-primary">提交申请</button>
      </div>
      <p class="hint" id="submitHint"></p>
    </form>
  </div>
</div>

<script>
  // 获取 URL 参数
  function getUrlParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  // 检查登录状态
  function checkLogin() {
    const currentUser = localStorage.getItem('gh:currentUser');
    if (!currentUser) {
      alert('请先登录后再申请职位');
      window.location.href = 'login.html';
      return null;
    }
    return JSON.parse(currentUser);
  }

  // 页面加载时初始化
  document.addEventListener('DOMContentLoaded', function() {
    const user = checkLogin();
    if (!user) return;

    // 显示用户信息
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userEmail').textContent = user.email;

    // 获取并显示职位信息
    const jobName = getUrlParam('job') || '未知职位';
    const jobDetails = {
      '环保项目协调员': { type: '全职', location: '北京' },
      '传播专员': { type: '全职', location: '上海' },
      '志愿者': { type: '兼职', location: '全国' }
    };

    document.getElementById('jobTitle').textContent = jobName;
    const details = jobDetails[jobName];
    if (details) {
      document.getElementById('jobDetails').textContent = `${details.type} | ${details.location}`;
    }
  });

  // 文件上传显示文件名
  document.getElementById('resume').addEventListener('change', function() {
    const fileName = this.files[0]?.name;
    if (fileName) {
      document.getElementById('fileName').textContent = `已选择: ${fileName}`;
    }
  });

  // 表单提交
  document.getElementById('applicationForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const jobName = getUrlParam('job') || '未知职位';
    const user = JSON.parse(localStorage.getItem('gh:currentUser'));
    
    // 构建申请数据
    const application = {
      jobName: jobName,
      userEmail: user.email,
      userName: user.name,
      phone: formData.get('phone'),
      salary: formData.get('salary'),
      experience: formData.get('experience'),
      education: formData.get('education'),
      introduction: formData.get('introduction'),
      experience_detail: formData.get('experience_detail'),
      resumeFile: document.getElementById('resume').files[0]?.name || '未上传',
      applyTime: new Date().toLocaleString('zh-CN')
    };

    // 保存到 localStorage（实际项目中应该发送到服务器）
    let applications = JSON.parse(localStorage.getItem('gh:applications') || '[]');
    applications.push(application);
    localStorage.setItem('gh:applications', JSON.stringify(applications));

    // 显示成功信息
    const hint = document.getElementById('submitHint');
    hint.textContent = '申请提交成功！我们会尽快与您联系。';
    hint.style.color = '#2c7a7b';

    // 3秒后跳转到首页
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 3000);
  });
</script>
</body>
</html>
